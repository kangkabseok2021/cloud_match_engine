services:

  match-engine:
    build:
      context: engine
      dockerfile: Dockerfile
    ports: ["50051:50051"]
    environment:
      GRPC_ADDRESS: 0.0.0.0:50051
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: gateway
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    environment:
      MATCH_ENGINE_HOST: match-engine
      MATCH_ENGINE_PORT: 50051
    depends_on:
      match-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
