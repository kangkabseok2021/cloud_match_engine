name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ match engine ───────────────────────────────────────────────────────
  cpp-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgrpc++-dev protobuf-compiler-grpc \
            libprotobuf-dev

      - name: Configure CMake
        run: cmake -B engine/build -S engine -DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build engine/build

      - name: Run GoogleTests (11 tests)
        run: ctest --test-dir engine/build --output-on-failure -V

  # ── Java Spring Boot gateway ──────────────────────────────────────────────
  java-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Maven tests (4 tests)
        run: mvn test -q -f gateway/pom.xml

  # ── Docker build smoke test ───────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [cpp-build-test, java-build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Validate K8s manifests (dry-run)
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          ./kubectl apply --dry-run=client -f k8s/ 2>&1 | grep -v "^Warning"
