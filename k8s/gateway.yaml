apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MATCH_ENGINE_HOST
              value: "match-engine"
            - name: MATCH_ENGINE_PORT
              value: "50051"
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            initialDelaySeconds: 20
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  type: ClusterIP
  selector: { app: gateway }
  ports:
    - name: http
      port: 80
      targetPort: http
